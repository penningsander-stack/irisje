name: 🧹 Normalize Filenames to Lowercase (Safe, Backend + Frontend)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  normalize:
    name: Normalize all filenames (backend & frontend)
    runs-on: ubuntu-latest

    steps:
      - name: 🧭 Checkout repository
        uses: actions/checkout@v4

      - name: 🧰 Setup environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🔍 Find and safely rename files with uppercase letters
        run: |
          mkdir -p logs
          LOGFILE="logs/normalized-files.log"
          echo "🔍 Searching for files with uppercase letters..." | tee -a $LOGFILE
          FILES=$(find backend frontend -type f | grep -E '[A-Z]' || true)

          if [ -z "$FILES" ]; then
            echo "✨ No uppercase filenames found." | tee -a $LOGFILE
          else
            echo "📂 Files to rename:" | tee -a $LOGFILE
            echo "$FILES" | tee -a $LOGFILE
          fi

          # Detect conflicts (two files that would collide when lowercased)
          CONFLICTS=$(echo "$FILES" | while read -r f; do
            echo "$(dirname "$f")/$(basename "$f" | tr 'A-Z' 'a-z')"
          done | sort | uniq -d)

          if [ -n "$CONFLICTS" ]; then
            echo "🚫 Conflict detected! Skipping rename to prevent data loss." | tee -a $LOGFILE
            echo "$CONFLICTS" | tee -a $LOGFILE
            exit 1
          fi

          # Rename safely
          echo "$FILES" | while read -r file; do
            lowercase="$(dirname "$file")/$(basename "$file" | tr 'A-Z' 'a-z')"
            if [ "$file" != "$lowercase" ]; then
              echo "↘️ Renaming: $file → $lowercase" | tee -a $LOGFILE
              git mv -f "$file" "$lowercase" 2>/dev/null || mv "$file" "$lowercase"
            fi
          done
          echo "✅ Filenames normalized." | tee -a $LOGFILE

      - name: 🧩 Fix require() and import paths to match lowercase filenames
        run: |
          LOGFILE="logs/normalized-files.log"
          echo "🔧 Adjusting require() and import paths..." | tee -a $LOGFILE
          find backend frontend -type f \( -name "*.js" -o -name "*.html" \) | while read -r file; do
            # Backend requires
            sed -i 's|require("./config/ValidateEnv")|require("./config/validateenv")|g' "$file"
            sed -i 's|require("./utils/LogHelper")|require("./utils/loghelper")|g' "$file"
            sed -i 's|require("../utils/EmailTemplates")|require("../utils/emailtemplates")|g' "$file"
            sed -i 's|require("./routes/PublicRequests")|require("./routes/publicrequests")|g' "$file"
            sed -i 's|require("./routes/GoogleReviews")|require("./routes/googlereviews")|g' "$file"
            sed -i 's|require("../models/Request")|require("../models/request")|g' "$file"
            sed -i 's|require("../models/Company")|require("../models/company")|g' "$file"
            sed -i 's|require("../models/Review")|require("../models/review")|g' "$file"
            sed -i 's|require("../models/User")|require("../models/user")|g' "$file"
            sed -i 's|require("../utils/AutoSeed")|require("../utils/autoseed")|g' "$file"

            # Frontend imports (HTML & JS)
            sed -i 's|src="Js/|src="js/|g' "$file"
            sed -i 's|src="JS/|src="js/|g' "$file"
            sed -i 's|href="Css/|href="css/|g' "$file"
            sed -i 's|href="CSS/|href="css/|g' "$file"
          done
          echo "✅ Import paths fixed." | tee -a $LOGFILE

      - name: 💾 Commit and push normalization changes (with retry & empty check)
        run: |
          LOGFILE="logs/normalized-files.log"
          git config user.name "Irisje AutoFixer"
          git config user.email "bot@irisje.nl"

          if git diff --quiet; then
            echo "✨ No changes detected, skipping commit and push." | tee -a $LOGFILE
            exit 0
          fi

          git add .
          git commit -m "chore: normalize filenames and imports to lowercase (safe mode)"

          n=0
          until git push || [ $n -ge 3 ]; do
            echo "⚠️ Push failed (possibly concurrent workflow). Retrying in 10s..." | tee -a $LOGFILE
            n=$((n+1))
            sleep 10
          done
          echo "✅ Push completed or safely skipped after ${n} retries." | tee -a $LOGFILE

      - name: 📦 Upload normalization log as artifact
        uses: actions/upload-artifact@v4
        with:
          name: normalized-files.log
          path: logs/normalized-files.log

      - name: 🚀 Trigger Render deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️ No Render hook configured (no auto-deploy)."
            exit 0
          fi
          echo "🚀 Triggering Render deployment..."
          curl -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "✅ Render build triggered successfully."
