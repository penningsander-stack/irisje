name: 🧩 Update Style Version Before Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  bump-style-version:
    runs-on: ubuntu-latest

    steps:
      - name: 🧭 Checkout repository
        uses: actions/checkout@v4

      - name: 🧰 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 🔢 Update style.css version query
        run: |
          echo "🔄 Updating style.css version tag..."
          ts=$(date +%Y%m%d%H%M)
          find frontend -type f -name "*.html" -exec sed -i "s/style\.css?v=[0-9]*/style.css?v=${ts}/g" {} +
          echo "✅ Updated version tag to ${ts}"

      - name: 💾 Commit and push updated files (with retry & empty-commit check)
        run: |
          git config user.name "Irisje AutoUpdater"
          git config user.email "bot@irisje.nl"

          if git diff --quiet; then
            echo "✨ No changes detected, skipping commit and push."
            exit 0
          fi

          git add frontend
          git commit -m "chore: bump style.css version automatically"

          n=0
          until git push || [ $n -ge 3 ]; do
            echo "⚠️ Push failed (possibly concurrent workflow). Retrying in 10s..."
            n=$((n+1))
            sleep 10
          done
          echo "✅ Push completed or safely skipped after ${n} retries."

      - name: 🚀 Trigger Render Deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️ No Render deploy hook configured."
            exit 0
          fi
          echo "🚀 Triggering Render deployment..."
          curl -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "✅ Render build triggered successfully."
