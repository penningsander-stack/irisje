# .github/workflows/auto-format.yml
name: 🎨 Auto Formatter

on:
  push:
    paths:
      - "frontend/**/*.html"
      - "frontend/css/**"
      - "frontend/js/**"
      - ".github/workflows/auto-format.yml"
  workflow_dispatch:

jobs:
  format:
    name: Controleer & formatteer frontend-bestanden
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟣 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Installeer Prettier (formatter)
        run: |
          npm install -g prettier

      - name: 🎨 Format HTML, CSS & JS
        run: |
          echo "Formatteer frontend-bestanden..."
          prettier --write "frontend/**/*.{html,css,js}" || echo "⚠️ Formatter waarschuwing, maar doorgegaan."

      - name: ✅ Samenvatting
        run: |
          echo "Auto-format voltooid — controleer gewijzigde bestanden in de Action-log."
