# .github/workflows/check-html-layout.yml
name: 🔍 Controleer & herstel HTML-layout

on:
  push:
    paths:
      - "frontend/**/*.html"
      - "frontend/js/**"
      - "frontend/css/**"
      - ".github/workflows/check-html-layout.yml"
  workflow_dispatch:

jobs:
  check-and-fix:
    name: Controleer & herstel HTML-bestanden
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟣 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Installeer frontend dependencies (indien aanwezig)
        working-directory: frontend
        run: |
          if [ -f package.json ]; then
            echo "package.json gevonden — installeren..."
            npm ci --omit=dev || npm install --omit=dev || true
          else
            echo "Geen package.json gevonden, stap overslaan."
          fi

      - name: 🛠️ Controleer & herstel HTML-layouts
        working-directory: frontend
        run: |
          if [ -f check-html-layout.js ]; then
            echo "Controle uitvoeren..."
            node check-html-layout.js || echo "⚠️ Fouten gedetecteerd maar doorgegaan."
          else
            echo "⚠️ check-html-layout.js niet gevonden, stap overslaan."
          fi

      - name: 📤 Upload eventuele backups
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup_fixed_html
          path: frontend/backup_fixed_html
          if-no-files-found: ignore
