name: 🔍 Controleer en herstel HTML-layout

on:
  push:
    paths:
      - "frontend/**/*.html"
      - "frontend/js/**"
      - "frontend/css/**"
      - ".github/workflows/check-html-layout.yml"
  workflow_dispatch:

jobs:
  check-and-fix:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🟣 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 📦 Installeer frontend-deps (als nodig)
        working-directory: frontend
        run: |
          if [ -f package.json ]; then
            npm install --omit=dev || true
          fi

      - name: 🛠️ Controle & herstel HTML
        working-directory: frontend
        run: |
          # run jouw script dat je net hebt gebruikt in Codespace
          node check-html-layout.js || true

      - name: 📤 Upload eventuele backups
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup_fixed_html
          path: frontend/backup_fixed_html
          if-no-files-found: ignore
