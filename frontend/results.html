<!-- frontend/results.html -->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zoekresultaten – Irisje.nl</title>
  <meta name="description" content="Bekijk bedrijven bij jou in de buurt, vergelijk reviews en vraag direct een offerte aan." />
  <meta name="theme-color" content="#4F46E5" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css?v=20251109" />
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen fade-seq">

  <!-- HEADER -->
  <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-40 backdrop-blur-sm">
    <div class="max-w-6xl mx-auto flex justify-between items-center px-4 py-4">
      <a href="index.html" class="flex items-center space-x-2 font-semibold text-indigo-700 text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 rounded-lg">
        <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-indigo-600 text-white text-sm font-bold">I</span>
        <span>Irisje.nl</span>
      </a>
      <nav class="hidden sm:flex space-x-6 text-sm font-medium text-gray-600">
        <a href="index.html" class="hover:text-indigo-600 transition">Home</a>
        <a href="login.html" class="hover:text-indigo-600 transition">Inloggen</a>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-10 space-y-10">
    <section>
      <h1 class="text-2xl font-bold text-indigo-700 mb-6 flex items-center">
        <span class="text-3xl mr-2">🔎</span> Bedrijven in jouw regio
      </h1>

      <!-- FILTERS -->
      <form id="filterForm" class="bg-white rounded-2xl shadow border border-gray-100 p-6 grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <input id="filterCategory" type="text" placeholder="Categorie (bijv. loodgieter)" class="border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
        <input id="filterCity" type="text" placeholder="Plaats" class="border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl py-3 text-sm transition">
          Zoeken
        </button>
      </form>

      <div class="flex items-center justify-between mb-4">
        <p id="filterMessage" class="text-xs text-gray-500"></p>
        <div id="selectionInfo" class="text-sm text-gray-600 font-medium">
          0 van 5 geselecteerd
        </div>
      </div>

      <!-- KNOP -->
      <div class="text-center mb-6">
        <button id="sendRequestBtn" disabled
          class="bg-indigo-400 cursor-not-allowed text-white font-semibold rounded-xl px-6 py-3 text-sm transition disabled:opacity-50 disabled:cursor-not-allowed">
          Offerte aanvragen bij geselecteerde bedrijven
        </button>
      </div>

      <!-- RESULTATEN -->
      <section id="resultsContainer" class="grid gap-6">
        <div class="text-gray-500 text-sm">Resultaten worden geladen...</div>
      </section>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="text-center text-sm text-gray-500 py-6 border-t bg-gray-100">
    © 2025 Irisje.nl – Alle rechten voorbehouden
  </footer>

  <!-- SCRIPT -->
  <script>
  const API_BASE = "https://irisje-backend.onrender.com/api";
  const MAX_SELECTION = 5;
  let selectedCompanies = [];

  const stars = rating => {
    const r = Math.round(rating || 0);
    return r > 0 ? "⭐".repeat(r) : "—";
  };

  async function loadResults(category, city) {
    const container = document.getElementById("resultsContainer");
    const msg = document.getElementById("filterMessage");
    container.innerHTML = "<div class='text-gray-500 text-sm'>⏳ Resultaten worden geladen...</div>";
    msg.textContent = "";

    try {
      const url = `${API_BASE}/companies/search?category=${encodeURIComponent(category || "")}&city=${encodeURIComponent(city || "")}`;
      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "Serverfout");

      const items = data.items || [];
      if (items.length === 0) {
        container.innerHTML = `
          <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 text-center text-gray-500 text-sm">
            Geen bedrijven gevonden.<br />Probeer een andere categorie of plaats.
          </div>`;
        msg.textContent = "Geen resultaten gevonden";
        return;
      }

      // Sorteer op beoordeling (hoog naar laag)
      items.sort((a, b) => (b.avgRating || 0) - (a.avgRating || 0));

      container.innerHTML = items.map(c => `
        <article class="bg-white rounded-2xl border border-gray-200 shadow-sm hover:shadow-md transition p-5 relative">
          <label class="absolute top-4 right-4">
            <input type="checkbox" class="company-select accent-indigo-600 w-5 h-5" data-id="${c._id}" data-name="${c.name}" />
          </label>
          <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3">
            <div>
              <h2 class="text-lg font-semibold text-indigo-700 leading-tight">${c.name || "Onbekend bedrijf"}</h2>
              <div class="text-gray-500 text-sm">${c.city || ""}</div>
              <div class="text-gray-400 text-xs mt-1">${Array.isArray(c.categories) ? c.categories.join(", ") : ""}</div>
              <p class="text-gray-700 text-sm mt-3 leading-relaxed">${c.tagline || ""}</p>
            </div>
            <div class="text-right">
              <div class="text-yellow-500 text-sm font-semibold leading-none">${stars(c.avgRating)}</div>
              <div class="text-gray-500 text-xs leading-none mt-1">${c.reviewCount || 0} reviews</div>
            </div>
          </div>

          <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between mt-4">
            <a href="company.html?slug=${encodeURIComponent(c.slug)}"
              class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl px-4 py-2 text-xs text-center transition">
              Bekijk profiel
            </a>
            <div class="text-gray-400 text-[11px] mt-3 sm:mt-0">
              ${c.isVerified ? "✅ Geverifieerd bedrijf" : "⏳ Niet geverifieerd"}
            </div>
          </div>
        </article>
      `).join("");

      msg.textContent = `${items.length} resultaat${items.length > 1 ? "en" : ""} gevonden`;
    } catch (err) {
      console.error("❌ Fout bij laden resultaten:", err);
      container.innerHTML = `
        <div class="bg-white border border-red-200 text-red-600 rounded-xl p-5 shadow-sm text-sm">
          ❌ Er ging iets mis bij het laden van de resultaten.
        </div>`;
    }
  }

  function updateSelectionDisplay() {
    const info = document.getElementById("selectionInfo");
    const btn = document.getElementById("sendRequestBtn");
    info.textContent = `${selectedCompanies.length} van ${MAX_SELECTION} geselecteerd`;

    if (selectedCompanies.length > 0) {
      btn.disabled = false;
      btn.classList.remove("bg-indigo-400", "cursor-not-allowed");
      btn.classList.add("bg-indigo-600", "hover:bg-indigo-700", "cursor-pointer");
    } else {
      btn.disabled = true;
      btn.classList.add("bg-indigo-400", "cursor-not-allowed");
      btn.classList.remove("bg-indigo-600", "hover:bg-indigo-700", "cursor-pointer");
    }
  }

  // Checkbox selectie
  document.addEventListener("change", (e) => {
    const cb = e.target.closest(".company-select");
    if (!cb) return;

    const id = cb.dataset.id;
    const name = cb.dataset.name;

    if (cb.checked) {
      if (selectedCompanies.length >= MAX_SELECTION) {
        alert(`Je kunt maximaal ${MAX_SELECTION} bedrijven selecteren.`);
        cb.checked = false;
        return;
      }
      selectedCompanies.push({ id, name });
    } else {
      selectedCompanies = selectedCompanies.filter(c => c.id !== id);
    }

    updateSelectionDisplay();
  });

  // Knop om aanvraag te versturen
  document.getElementById("sendRequestBtn").addEventListener("click", async () => {
    if (selectedCompanies.length === 0) return;
    const confirmSend = confirm(`Offerte aanvragen bij ${selectedCompanies.length} geselecteerde bedrijf${selectedCompanies.length > 1 ? "ven" : ""}?`);
    if (!confirmSend) return;

    try {
      const res = await fetch(`${API_BASE}/publicRequests/multi`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ companies: selectedCompanies })
      });
      if (!res.ok) throw new Error("Serverfout bij verzenden aanvraag");

      alert("✅ Aanvraag succesvol verzonden!");
      selectedCompanies = [];
      document.querySelectorAll(".company-select").forEach(cb => cb.checked = false);
      updateSelectionDisplay();
    } catch (err) {
      console.error("❌ Fout bij verzenden aanvraag:", err);
      alert("Er is een fout opgetreden bij het verzenden van de aanvraag.");
    }
  });

  // 🌐 Params ophalen
  const getParam = n => new URLSearchParams(window.location.search).get(n) || "";

  document.getElementById("filterForm").addEventListener("submit", e => {
    e.preventDefault();
    const cat = document.getElementById("filterCategory").value.trim();
    const city = document.getElementById("filterCity").value.trim();
    loadResults(cat, city);
  });

  document.addEventListener("DOMContentLoaded", () => {
    const cat = getParam("category");
    const city = getParam("city");
    document.getElementById("filterCategory").value = cat;
    document.getElementById("filterCity").value = city;
    loadResults(cat, city);

    document.querySelectorAll("header, main section, footer").forEach((el, i) => {
      el.style.opacity = "0";
      el.style.transform = "translateY(12px)";
      setTimeout(() => {
        el.style.transition = "opacity .8s ease, transform .8s ease";
        el.style.opacity = "1";
        el.style.transform = "translateY(0)";
      }, 150 * i);
    });
  });
  </script>
</body>
</html>
