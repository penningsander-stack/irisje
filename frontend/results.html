<!-- frontend/results.html -->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zoekresultaten – Irisje.nl</title>
  <meta name="description" content="Bekijk bedrijven bij jou in de buurt, vergelijk reviews en vraag direct een offerte aan." />
  <meta name="theme-color" content="#4F46E5" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css?v=20251106" />
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen fade-seq">

  <!-- HEADER -->
  <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-40 backdrop-blur-sm">
    <div class="max-w-6xl mx-auto flex justify-between items-center px-4 py-4">
      <a href="index.html" class="flex items-center space-x-2 font-semibold text-indigo-700 text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 rounded-lg">
        <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-indigo-600 text-white text-sm font-bold">I</span>
        <span>Irisje.nl</span>
      </a>
      <nav class="hidden sm:flex space-x-6 text-sm font-medium text-gray-600">
        <a href="index.html" class="hover:text-indigo-600 transition">Home</a>
        <a href="login.html" class="hover:text-indigo-600 transition">Inloggen</a>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1 max-w-6xl mx-auto w-full px-4 py-10 space-y-10">
    <section>
      <h1 class="text-2xl font-bold text-indigo-700 mb-6 flex items-center">
        <span class="text-3xl mr-2">🔎</span> Bedrijven in jouw regio
      </h1>

      <!-- FILTERS -->
      <form id="filterForm" class="bg-white rounded-2xl shadow border border-gray-100 p-6 grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
        <input id="filterCategory" type="text" placeholder="Categorie (bijv. loodgieter)" class="border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
        <input id="filterCity" type="text" placeholder="Plaats" class="border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />
        <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl py-3 text-sm transition">
          Zoeken
        </button>
      </form>
      <p id="filterMessage" class="text-xs text-gray-500 mb-4"></p>

      <!-- SELECTIEBALK -->
      <div id="selectionBar" class="hidden bg-indigo-50 border border-indigo-100 rounded-2xl p-4 mb-6 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
        <div>
          <p class="text-sm text-indigo-900 font-medium">
            Geselecteerde bedrijven: <span id="selectedCount">0</span>/5
          </p>
          <p class="text-xs text-indigo-700" id="selectedNames"></p>
        </div>
        <div class="flex gap-2">
          <button id="openRequestForm" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-xl transition disabled:opacity-50" disabled>
            Offerte aanvragen
          </button>
          <button id="clearSelection" class="text-xs text-indigo-700 hover:underline">
            Alles deselecteren
          </button>
        </div>
      </div>

      <!-- AANVRAAGFORM -->
      <div id="requestFormBox" class="hidden bg-white border border-gray-100 rounded-2xl shadow p-5 mb-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-2">Offerte aanvragen bij geselecteerde bedrijven</h2>
        <p class="text-sm text-gray-500 mb-4">Je aanvraag wordt verstuurd naar de bedrijven die je hebt aangevinkt (max. 5).</p>
        <form id="requestForm" class="grid gap-3 md:grid-cols-2">
          <input type="text" id="rqName" placeholder="Je naam" class="border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" required />
          <input type="email" id="rqEmail" placeholder="Je e-mailadres" class="border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" required />
          <textarea id="rqMessage" class="md:col-span-2 border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" rows="3" placeholder="Beschrijf je klus / vraag (optioneel)"></textarea>
          <p id="rqStatus" class="md:col-span-2 text-sm min-h-[1.25rem]"></p>
          <div class="md:col-span-2 flex gap-3">
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-xl transition">
              Verstuur aanvraag
            </button>
            <button type="button" id="closeRequestForm" class="text-sm text-gray-500 hover:text-gray-700">Annuleren</button>
          </div>
        </form>
      </div>

      <!-- RESULTATEN -->
      <section id="resultsContainer" class="grid gap-6">
        <div class="text-gray-500 text-sm">Resultaten worden geladen...</div>
      </section>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="text-center text-sm text-gray-500 py-6 border-t bg-gray-100">
    © 2025 Irisje.nl – Alle rechten voorbehouden
  </footer>

  <!-- SCRIPT -->
  <script>
  const API_BASE = "https://irisje-backend.onrender.com/api";
  const MAX_SELECTION = 5;
  const selectedMap = new Map(); // id -> {id, name}

  const stars = rating => {
    const r = Math.round(rating || 0);
    return r > 0 ? "⭐".repeat(r) : "—";
  };

  function updateSelectionUI() {
    const selectionBar = document.getElementById("selectionBar");
    const countEl = document.getElementById("selectedCount");
    const namesEl = document.getElementById("selectedNames");
    const openBtn = document.getElementById("openRequestForm");

    const arr = Array.from(selectedMap.values());
    const count = arr.length;
    countEl.textContent = count;

    if (count === 0) {
      selectionBar.classList.add("hidden");
      openBtn.disabled = true;
      namesEl.textContent = "";
    } else {
      selectionBar.classList.remove("hidden");
      openBtn.disabled = false;
      namesEl.textContent = arr.map(c => c.name).join(", ");
    }
  }

  async function loadResults(category, city) {
    const container = document.getElementById("resultsContainer");
    const msg = document.getElementById("filterMessage");
    container.innerHTML = "<div class='text-gray-500 text-sm'>⏳ Resultaten worden geladen...</div>";
    msg.textContent = "";

    try {
      const url = `${API_BASE}/companies/search?category=${encodeURIComponent(category || "")}&city=${encodeURIComponent(city || "")}`;
      const res = await fetch(url);
      const contentType = res.headers.get("content-type") || "";
      if (!contentType.includes("application/json")) {
        const text = await res.text();
        throw new Error("Server gaf geen JSON terug: " + text.slice(0, 80));
      }
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "Serverfout");

      let items = data.items || [];

      // sorteer: hoogste rating → meeste reviews → naam
      items = items.sort((a, b) => {
        const ra = a.avgRating || 0;
        const rb = b.avgRating || 0;
        if (rb !== ra) return rb - ra;
        const ca = a.reviewCount || 0;
        const cb = b.reviewCount || 0;
        if (cb !== ca) return cb - ca;
        return (a.name || "").localeCompare(b.name || "");
      });

      if (items.length === 0) {
        container.innerHTML = `
          <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 text-center text-gray-500 text-sm">
            Geen bedrijven gevonden.<br />Probeer een andere categorie of plaats.
          </div>`;
        msg.textContent = "Geen resultaten gevonden";
        return;
      }

      container.innerHTML = items.map(c => `
        <article class="bg-white rounded-2xl border border-gray-200 shadow-sm hover:shadow-md transition p-5 flex flex-col gap-4">
          <div class="flex items-start justify-between gap-3">
            <div>
              <h2 class="text-lg font-semibold text-indigo-700 leading-tight">${c.name || "Onbekend bedrijf"}</h2>
              <div class="text-gray-500 text-sm">${c.city || ""}</div>
              <div class="text-gray-400 text-xs mt-1">${Array.isArray(c.categories) ? c.categories.join(", ") : ""}</div>
              <p class="text-gray-700 text-sm mt-3 leading-relaxed">${c.tagline || ""}</p>
            </div>
            <div class="text-right">
              <div class="text-yellow-500 text-sm font-semibold leading-none">${stars(c.avgRating)}</div>
              <div class="text-gray-500 text-xs leading-none mt-1">${c.reviewCount || 0} reviews</div>
            </div>
          </div>

          <div class="flex items-center justify-between gap-3">
            <a href="company.html?slug=${encodeURIComponent(c.slug)}"
              class="inline-block bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl px-4 py-2 text-xs text-center transition">
              Bekijk profiel
            </a>

            <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer select-none">
              <input
                type="checkbox"
                class="company-select w-4 h-4 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"
                data-id="${c._id}"
                data-name="${c.name?.replace(/"/g, "&quot;") || "Onbekend"}"
              />
              Aanvragen
            </label>

            <div class="text-gray-400 text-[11px]">
              ${c.isVerified ? "✅ Geverifieerd bedrijf" : "⏳ Niet geverifieerd"}
            </div>
          </div>
        </article>
      `).join("");

      msg.textContent = `${items.length} resultaat${items.length > 1 ? "en" : ""} gevonden`;

      // checkbox events
      container.querySelectorAll(".company-select").forEach(chk => {
        chk.addEventListener("change", e => {
          const id = e.target.dataset.id;
          const name = e.target.dataset.name;
          if (e.target.checked) {
            if (selectedMap.size >= MAX_SELECTION) {
              e.target.checked = false;
              alert("Je kunt maximaal 5 bedrijven selecteren.");
              return;
            }
            selectedMap.set(id, { id, name });
          } else {
            selectedMap.delete(id);
          }
          updateSelectionUI();
        });
      });

    } catch (err) {
      console.error("❌ Fout bij laden resultaten:", err);
      container.innerHTML = `
        <div class="bg-white border border-red-200 text-red-600 rounded-xl p-5 shadow-sm text-sm">
          ❌ Er ging iets mis bij het laden van de resultaten.
        </div>`;
    }
  }

  const getParam = n => new URLSearchParams(window.location.search).get(n) || "";

  document.getElementById("filterForm").addEventListener("submit", e => {
    e.preventDefault();
    const cat = document.getElementById("filterCategory").value.trim();
    const city = document.getElementById("filterCity").value.trim();
    loadResults(cat, city);
  });

  document.getElementById("clearSelection").addEventListener("click", () => {
    selectedMap.clear();
    document.querySelectorAll(".company-select").forEach(chk => (chk.checked = false));
    updateSelectionUI();
    document.getElementById("requestFormBox").classList.add("hidden");
  });

  document.getElementById("openRequestForm").addEventListener("click", () => {
    if (selectedMap.size === 0) return;
    document.getElementById("requestFormBox").classList.remove("hidden");
    document.getElementById("rqStatus").textContent = "";
  });

  document.getElementById("closeRequestForm").addEventListener("click", () => {
    document.getElementById("requestFormBox").classList.add("hidden");
  });

  document.getElementById("requestForm").addEventListener("submit", async e => {
    e.preventDefault();
    const name = document.getElementById("rqName").value.trim();
    const email = document.getElementById("rqEmail").value.trim();
    const message = document.getElementById("rqMessage").value.trim();
    const statusEl = document.getElementById("rqStatus");

    const companies = Array.from(selectedMap.values()).map(c => c.id);
    if (companies.length === 0) {
      statusEl.textContent = "Selecteer eerst bedrijven.";
      statusEl.className = "md:col-span-2 text-sm text-red-600";
      return;
    }

    statusEl.textContent = "⏳ Bezig met versturen...";
    statusEl.className = "md:col-span-2 text-sm text-gray-500";

    try {
      const res = await fetch(`${API_BASE}/publicRequests/multi`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          customerName: name,
          customerEmail: email,
          message,
          companies,
        })
      });

      const data = await res.json();
      if (!res.ok || !data.ok) {
        throw new Error(data.error || "Kon aanvraag niet versturen");
      }

      statusEl.textContent = "✅ Aanvraag verstuurd naar geselecteerde bedrijven.";
      statusEl.className = "md:col-span-2 text-sm text-green-600";
      // eventueel formulier leegmaken
      // selectedMap.clear(); updateSelectionUI();
    } catch (err) {
      console.error("❌ Fout bij versturen aanvraag:", err);
      statusEl.textContent = "❌ Er ging iets mis bij het versturen.";
      statusEl.className = "md:col-span-2 text-sm text-red-600";
    }
  });

  document.addEventListener("DOMContentLoaded", () => {
    const cat = getParam("category");
    const city = getParam("city");
    document.getElementById("filterCategory").value = cat;
    document.getElementById("filterCity").value = city;
    loadResults(cat, city);
  });
  </script>
</body>
</html>
