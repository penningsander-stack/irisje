<!-- frontend/company.html -->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bedrijfsprofiel – Irisje.nl</title>
  <meta name="description" content="Bekijk bedrijfsinformatie, lees reviews en vraag offertes aan bij lokale specialisten op Irisje.nl." />
  <meta name="theme-color" content="#4F46E5" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css?v=20251101" />
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen fade-seq">

  <!-- HEADER -->
  <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-40 backdrop-blur-sm">
    <div class="max-w-6xl mx-auto flex justify-between items-center px-4 py-4">
      <a href="index.html" class="flex items-center space-x-2 font-semibold text-indigo-700 text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 rounded-lg">
        <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-indigo-600 text-white text-sm font-bold">I</span>
        <span>Irisje.nl</span>
      </a>
      <nav class="hidden sm:flex space-x-6 text-sm font-medium text-gray-600">
        <a href="index.html" class="hover:text-indigo-600 transition">Home</a>
        <a href="results.html" class="hover:text-indigo-600 transition">Bedrijven</a>
        <a href="login.html" class="hover:text-indigo-600 transition">Inloggen</a>
      </nav>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1 max-w-5xl mx-auto w-full px-4 py-10 space-y-10">

    <!-- 📇 Bedrijfsinformatie -->
    <section class="bg-white rounded-2xl shadow-md border border-gray-100 p-8 text-center">
      <img id="logo" src="https://via.placeholder.com/120" alt="Bedrijfslogo"
        class="mx-auto rounded-full shadow mb-4 w-28 h-28 object-cover bg-gray-100"
        onerror="this.style.display='none'" />

      <h1 id="companyName" class="text-3xl font-bold text-indigo-700 mb-1"></h1>
      <p id="tagline" class="text-gray-600 mb-3 text-sm"></p>

      <div class="flex flex-col items-center gap-1 text-sm mb-2">
        <div id="rating" class="text-yellow-500 text-lg leading-none"></div>
        <div id="reviewCount" class="text-gray-500 leading-none text-xs"></div>
      </div>

      <div id="city" class="text-gray-600 text-sm"></div>
      <div id="categories" class="text-gray-500 text-xs mt-1"></div>

      <p id="description" class="text-gray-700 text-base mt-5 max-w-2xl mx-auto leading-relaxed"></p>
    </section>

    <!-- 💬 Reviews -->
    <section class="bg-white rounded-2xl shadow-md border border-gray-100 p-8">
      <h2 class="text-xl font-semibold text-indigo-700 mb-5 flex items-center gap-2">
        💬 <span>Beoordelingen</span>
      </h2>
      <div id="review-list" class="space-y-4 text-left">
        <div class="text-gray-500 text-sm">Reviews worden geladen...</div>
      </div>
    </section>

    <!-- ✍ Nieuwe review -->
    <section class="bg-white rounded-2xl shadow-md border border-gray-100 p-8">
      <h2 class="text-xl font-semibold text-indigo-700 mb-5 flex items-center gap-2">
        ✍ <span>Jouw ervaring</span>
      </h2>

      <form id="reviewForm" class="space-y-4">
        <input id="reviewName" type="text" placeholder="Naam" required
          class="w-full border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />

        <input id="reviewEmail" type="email" placeholder="E-mailadres (wordt niet getoond)"
          class="w-full border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none" />

        <select id="reviewRating" required
          class="w-full border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none">
          <option value="">Kies aantal sterren</option>
          <option value="5">⭐⭐⭐⭐⭐</option>
          <option value="4">⭐⭐⭐⭐</option>
          <option value="3">⭐⭐⭐</option>
          <option value="2">⭐⭐</option>
          <option value="1">⭐</option>
        </select>

        <textarea id="reviewMessage" placeholder="Bericht" required
          class="w-full border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 focus:outline-none"></textarea>

        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl py-3 text-sm transition">
          Verstuur beoordeling
        </button>
        <p id="reviewStatusMsg" class="text-center text-sm mt-2 min-h-[1.25rem]"></p>
      </form>
    </section>

    <!-- 📬 Offerte aanvragen -->
    <section class="bg-white rounded-2xl shadow-md border border-gray-100 p-8">
      <h2 class="text-xl font-semibold text-green-700 mb-5 flex items-center gap-2">
        📬 <span>Vraag een offerte aan</span>
      </h2>

      <form id="requestForm" class="space-y-4">
        <input id="requestName" type="text" placeholder="Naam" required
          class="w-full border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />

        <input id="requestEmail" type="email" placeholder="E-mailadres" required
          class="w-full border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none" />

        <textarea id="requestMessage" placeholder="Beschrijf je klus of vraag" required
          class="w-full border border-gray-300 rounded-xl p-3 text-sm focus:ring-2 focus:ring-green-500 focus:outline-none"></textarea>

        <button type="submit"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold rounded-xl py-3 text-sm transition">
          Verstuur aanvraag
        </button>
        <p id="requestStatusMsg" class="text-center text-sm mt-2 min-h-[1.25rem]"></p>
      </form>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="text-center text-xs text-gray-500 py-6 border-t bg-gray-100 mt-auto">
    © 2025 Irisje.nl – Alle rechten voorbehouden
  </footer>

  <!-- ✅ SCRIPT -->
  <script>
    const API_BASE = "https://irisje-backend.onrender.com/api";
    const slug = new URLSearchParams(window.location.search).get("slug") || "";
    const stars = r => "⭐".repeat(Math.round(r || 0));

    async function loadCompany() {
      try {
        const res = await fetch(\`\${API_BASE}/companies/\${encodeURIComponent(slug)}\`);
        if (!res.ok) throw new Error();
        const data = await res.json();
        companyName.textContent = data.name || "";
        tagline.textContent = data.tagline || "";
        rating.textContent = stars(data.avgRating);
        reviewCount.textContent = \`(\${data.reviewCount || 0} reviews)\`;
        city.textContent = data.city || "";
        categories.textContent = Array.isArray(data.categories) ? data.categories.join(", ") : "";
        description.textContent = data.description || "";
        if (data.logoUrl) logo.src = data.logoUrl;
      } catch {
        companyName.textContent = "❌ Kon bedrijfsgegevens niet laden.";
      }
    }

    async function loadReviews() {
      try {
        const res = await fetch(\`\${API_BASE}/reviews?slug=\${encodeURIComponent(slug)}\`);
        const data = await res.json();
        if (!data.length) {
          review-list.innerHTML = "<div class='text-gray-500 text-sm'>Nog geen beoordelingen beschikbaar.</div>";
          return;
        }
        review-list.innerHTML = data.map(r => {
          const d = new Date(r.createdAt || Date.now()).toLocaleDateString("nl-NL", { day: "numeric", month: "short", year: "numeric" });
          return \`
            <div class="border border-gray-200 rounded-xl p-4 bg-gray-50 hover:shadow transition">
              <div class="text-yellow-500 text-sm font-semibold">\${"⭐".repeat(r.rating || 0)}</div>
              <p class="text-gray-800 text-sm mt-2 whitespace-pre-line">\${r.message || ""}</p>
              <div class="text-gray-500 text-xs mt-3">— \${r.name || "Anoniem"}, \${d}</div>
            </div>\`;
        }).join("");
      } catch {
        review-list.innerHTML = "<div class='text-red-600 text-sm'>❌ Fout bij laden reviews.</div>";
      }
    }

    reviewForm.addEventListener("submit", async e => {
      e.preventDefault();
      const msg = reviewStatusMsg;
      msg.textContent = "Bezig met versturen...";
      msg.className = "text-gray-500 text-center text-sm";
      try {
        const res = await fetch(\`\${API_BASE}/reviews\`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            companySlug: slug,
            name: reviewName.value.trim(),
            email: reviewEmail.value.trim(),
            rating: reviewRating.value,
            message: reviewMessage.value.trim()
          })
        });
        if (!res.ok) throw new Error();
        msg.textContent = "✅ Bedankt voor je beoordeling!";
        msg.className = "text-green-600 text-center text-sm";
        reviewForm.reset();
        loadReviews();
      } catch {
        msg.textContent = "❌ Er ging iets mis bij het versturen.";
        msg.className = "text-red-600 text-center text-sm";
      }
    });

    requestForm.addEventListener("submit", async e => {
      e.preventDefault();
      const msg = requestStatusMsg;
      msg.textContent = "Bezig met verzenden...";
      msg.className = "text-gray-500 text-center text-sm";
      try {
        const companyRes = await fetch(\`\${API_BASE}/companies/\${encodeURIComponent(slug)}\`);
        const companyData = await companyRes.json();
        const res = await fetch(\`\${API_BASE}/requests\`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            company: companyData._id,
            name: requestName.value.trim(),
            email: requestEmail.value.trim(),
            message: requestMessage.value.trim()
          })
        });
        if (!res.ok) throw new Error();
        msg.textContent = "✅ Aanvraag succesvol verzonden!";
        msg.className = "text-green-600 text-center text-sm";
        requestForm.reset();
      } catch {
        msg.textContent = "❌ Er ging iets mis bij het verzenden.";
        msg.className = "text-red-600 text-center text-sm";
      }
    });

    document.addEventListener("DOMContentLoaded", () => {
      loadCompany();
      loadReviews();
      // Fade-in
      const els = document.querySelectorAll("header, main section, footer");
      els.forEach((el, i) => {
        el.style.opacity = "0";
        el.style.transform = "translateY(12px)";
        requestAnimationFrame(() => {
          setTimeout(() => {
            el.style.transition = "opacity .8s ease, transform .8s ease";
            el.style.opacity = "1";
            el.style.transform = "translateY(0)";
          }, 150 * i);
        });
      });
    });
  </script>
</body>
</html>
