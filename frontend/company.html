<!-- frontend/company.html -->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bedrijf – Irisje.nl</title>
  <meta name="description" content="Bekijk bedrijfsinformatie, reviews en verstuur direct een aanvraag via Irisje.nl." />
  <meta name="theme-color" content="#4F46E5" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css?v=20251105" />
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen fade-seq">

  <!-- HEADER -->
  <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-40 backdrop-blur-sm">
    <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
      <a href="index.html" class="text-xl font-semibold text-indigo-600">Irisje.nl</a>
      <nav class="flex items-center gap-6 text-sm">
        <a href="index.html" class="hover:text-indigo-600 transition">Home</a>
        <a href="results.html" class="hover:text-indigo-600 transition">Bedrijven</a>
        <a href="login.html" class="hover:text-indigo-600 transition">Inloggen</a>
      </nav>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="flex-grow">
    <section id="company-section" class="max-w-5xl mx-auto p-6 md:p-10">
      <div id="company-info" class="bg-white shadow rounded-2xl p-6 md:p-10 animate-fadeIn">
        <h1 id="company-name" class="text-2xl md:text-3xl font-semibold text-gray-900 mb-2">Bedrijfsnaam</h1>
        <p id="company-tagline" class="text-gray-600 mb-4"></p>

        <div class="flex flex-col md:flex-row md:items-center gap-4 mb-6">
          <p id="company-address" class="text-gray-700"></p>
          <p id="company-city" class="text-gray-700"></p>
        </div>

        <div class="flex items-center gap-2 mb-4">
          <span id="company-rating" class="text-yellow-500 text-lg"></span>
          <span id="company-reviews" class="text-gray-500 text-sm"></span>
        </div>

        <p id="company-description" class="text-gray-700 leading-relaxed mb-6"></p>

        <div class="flex flex-wrap gap-3 mb-6">
          <a id="company-website" href="#" target="_blank"
             class="bg-indigo-600 text-white px-4 py-2 rounded-lg shadow hover:bg-indigo-700 transition text-sm hidden">
            🌐 Website bekijken
          </a>
          <button id="request-btn" class="bg-green-600 text-white px-4 py-2 rounded-lg shadow hover:bg-green-700 transition text-sm">
            📬 Offerte aanvragen
          </button>
        </div>

        <hr class="my-8" />

        <!-- REVIEWS -->
        <div>
          <h2 class="text-xl font-semibold mb-4 text-gray-800">💬 Beoordelingen</h2>
          <div id="reviews-container" class="space-y-4 mb-6">
            <p class="text-gray-500 italic">Reviews worden geladen...</p>
          </div>

          <form id="review-form" class="bg-gray-50 p-4 rounded-xl border border-gray-200">
            <h3 class="text-lg font-medium mb-3">✍ Jouw ervaring</h3>
            <div class="grid md:grid-cols-2 gap-3">
              <input type="text" id="review-name" placeholder="Naam" class="input" required />
              <input type="email" id="review-email" placeholder="E-mailadres (wordt niet getoond)" class="input" required />
            </div>
            <div class="mt-3">
              <label class="block text-sm text-gray-600 mb-1">Kies aantal sterren</label>
              <select id="review-rating" class="input" required>
                <option value="">– Kies –</option>
                <option value="5">⭐⭐⭐⭐⭐ (5)</option>
                <option value="4">⭐⭐⭐⭐ (4)</option>
                <option value="3">⭐⭐⭐ (3)</option>
                <option value="2">⭐⭐ (2)</option>
                <option value="1">⭐ (1)</option>
              </select>
            </div>
            <textarea id="review-message" placeholder="Bericht" class="input mt-3" rows="4" required></textarea>
            <button type="submit" class="mt-4 bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">
              Verstuur beoordeling
            </button>
          </form>
        </div>

        <hr class="my-8" />

        <!-- CLAIM -->
        <div>
          <h2 class="text-xl font-semibold mb-4 text-gray-800">🏷️ Ben jij de eigenaar van dit bedrijf?</h2>
          <p class="text-gray-600 mb-3">Claim dit profiel om zelf je bedrijfsgegevens en reviews te beheren.</p>
          <form id="claim-form" class="grid md:grid-cols-2 gap-3">
            <input type="text" id="claim-name" placeholder="Naam contactpersoon" class="input" required />
            <input type="email" id="claim-email" placeholder="Zakelijk e-mailadres" class="input" required />
            <input type="tel" id="claim-phone" placeholder="Telefoonnummer" class="input md:col-span-2" />
            <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition md:col-span-2">
              Claim dit bedrijf
            </button>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer class="bg-white border-t border-gray-200 mt-10 text-center py-4 text-sm text-gray-600">
    © 2025 Irisje.nl – Alle rechten voorbehouden
  </footer>

  <script>
    const API_BASE = "https://irisje-backend.onrender.com/api";

    async function loadCompany() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get("slug");
      if (!slug) return;

      const res = await fetch(`${API_BASE}/companies/${slug}`);
      const data = await res.json();
      if (!data.ok || !data.company) return;

      const c = data.company;
      document.getElementById("company-name").textContent = c.name;
      document.getElementById("company-tagline").textContent = c.tagline || "";
      document.getElementById("company-description").textContent = c.description || "Geen beschrijving beschikbaar.";
      document.getElementById("company-address").textContent = c.address || "";
      document.getElementById("company-city").textContent = c.city || "";
      if (c.website) {
        const link = document.getElementById("company-website");
        link.href = c.website;
        link.classList.remove("hidden");
      }
      if (c.avgRating && c.avgRating > 0) {
        document.getElementById("company-rating").textContent = "⭐".repeat(Math.round(c.avgRating));
        document.getElementById("company-reviews").textContent = `(${c.reviewCount || 0} reviews)`;
      } else {
        document.getElementById("company-rating").textContent = "Nog geen beoordelingen";
      }
    }

    document.addEventListener("DOMContentLoaded", loadCompany);
  </script>
</body>
</html>
