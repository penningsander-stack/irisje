<!-- frontend/status.html -->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Systeemstatus – Irisje.nl</title>
  <meta name="description" content="Bekijk de huidige status van de Irisje.nl server en database." />
  <meta name="theme-color" content="#4F46E5" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <!-- ✅ Performance preload & lokale Tailwind build -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=20251101" />
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen font-inter">
  <!-- HEADER -->
  <header class="bg-indigo-600 text-white py-4 shadow-md">
    <div class="max-w-4xl mx-auto px-4 flex justify-between items-center">
      <h1 class="text-xl font-semibold tracking-tight">🌸 Irisje.nl – Systeemstatus</h1>
      <a href="index.html" class="text-sm underline hover:text-indigo-200 focus:outline-none focus:ring-2 focus:ring-white rounded">Terug naar site</a>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1 flex flex-col items-center justify-center p-6 text-center space-y-6">
    <!-- STATUS -->
    <section id="statusCard" class="bg-white rounded-2xl shadow border border-gray-100 p-8 w-full max-w-md space-y-4">
      <h2 class="text-lg font-semibold text-indigo-700 mb-3">Serverstatus</h2>

      <div id="statusIndicator" class="text-4xl" aria-live="polite">⏳</div>
      <p id="statusText" class="text-gray-600 text-sm">Bezig met ophalen...</p>

      <div class="border-t my-4"></div>

      <dl class="grid grid-cols-2 gap-2 text-sm text-left">
        <dt class="font-medium text-gray-500">Versie:</dt><dd id="version">–</dd>
        <dt class="font-medium text-gray-500">Omgeving:</dt><dd id="environment">–</dd>
        <dt class="font-medium text-gray-500">Bedrijven:</dt><dd id="companies">–</dd>
        <dt class="font-medium text-gray-500">Uptime:</dt><dd id="uptime">–</dd>
        <dt class="font-medium text-gray-500">Geheugen:</dt><dd id="memory">–</dd>
        <dt class="font-medium text-gray-500">Server:</dt><dd id="server">–</dd>
      </dl>

      <div class="relative w-full bg-gray-200 h-3 rounded-full overflow-hidden mt-3" aria-label="Uptime indicatie">
        <div id="uptimeBar" class="absolute left-0 top-0 h-3 bg-indigo-600 transition-all duration-500" style="width:0%"></div>
      </div>

      <p class="text-xs text-gray-400 mt-3" id="timestamp"></p>
    </section>

    <!-- LOGS -->
    <section class="bg-white rounded-2xl shadow border border-gray-100 p-6 w-full max-w-2xl text-left">
      <div class="flex flex-wrap items-center justify-between mb-3 gap-2">
        <h3 class="text-md font-semibold text-indigo-700">📜 Laatste servermeldingen</h3>

        <div class="flex flex-wrap items-center gap-2 text-xs">
          <button id="toggleRefresh" class="px-3 py-1 rounded-full bg-green-600 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500">Auto-refresh: aan</button>
          <button data-filter="all" class="log-filter px-3 py-1 rounded-full bg-indigo-600 text-white">Alle</button>
          <button data-filter="info" class="log-filter px-3 py-1 rounded-full bg-gray-200 hover:bg-gray-300">Info</button>
          <button data-filter="debug" class="log-filter px-3 py-1 rounded-full bg-gray-200 hover:bg-gray-300">Debug</button>
          <button data-filter="error" class="log-filter px-3 py-1 rounded-full bg-gray-200 hover:bg-gray-300">Fouten</button>
        </div>
      </div>

      <pre id="logContainer" class="text-xs bg-gray-50 p-3 rounded overflow-y-auto max-h-64 font-mono text-gray-700 whitespace-pre-wrap" aria-live="polite"></pre>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="text-center text-sm text-gray-500 py-6 border-t bg-gray-100">
    © 2025 Irisje.nl – Alle rechten voorbehouden
  </footer>

  <!-- ✅ Logica -->
  <script>
    const STATUS_API = "https://irisje-backend.onrender.com/api/status";
    const LOG_API = "https://irisje-backend.onrender.com/api/admin/logs";
    let currentFilter = "all";
    let autoRefresh = true;

    async function loadStatus() {
      if (!autoRefresh) return;
      const indicator = document.getElementById("statusIndicator");
      const text = document.getElementById("statusText");

      try {
        const res = await fetch(STATUS_API);
        const data = await res.json();

        const colorMap = { "🟢": "text-green-600", "🟡": "text-yellow-500", "🔴": "text-red-600" };
        indicator.textContent = data.mongoStatus || "❓";
        indicator.className = "text-4xl " + (colorMap[data.mongoStatus] || "text-gray-500");

        document.getElementById("version").textContent = data.version;
        document.getElementById("environment").textContent = data.environment;
        document.getElementById("companies").textContent = data.companyCount;
        document.getElementById("uptime").textContent = data.uptime;
        document.getElementById("memory").textContent = data.memory;
        document.getElementById("server").textContent = data.server;
        document.getElementById("timestamp").textContent =
          "Laatst bijgewerkt: " + new Date(data.timestamp).toLocaleTimeString();

        text.textContent =
          data.mongoStatus === "🟢"
            ? "MongoDB verbonden en actief"
            : data.mongoStatus === "🟡"
            ? "Verbinding wordt opgebouwd..."
            : "Geen verbinding met database";

        const minutes = parseInt((data.uptime || "").split("m")[0]) || 0;
        document.getElementById("uptimeBar").style.width = Math.min(100, (minutes / 60) * 100) + "%";
      } catch (err) {
        indicator.textContent = "🔴";
        indicator.className = "text-4xl text-red-600";
        text.textContent = "Server niet bereikbaar";
      }
    }

    async function loadLogs() {
      if (!autoRefresh) return;
      try {
        const res = await fetch(LOG_API);
        const data = await res.json();
        const logs = data.logs || [];

        const filtered =
          currentFilter === "all" ? logs : logs.filter((l) => l.level === currentFilter);
        const lines = filtered
          .map(
            (l) =>
              `[${new Date(l.time).toLocaleTimeString()}] ${l.level.toUpperCase()} → ${l.message}`
          )
          .join("\n");

        document.getElementById("logContainer").textContent =
          lines || "(Geen logmeldingen gevonden)";
      } catch (err) {
        document.getElementById("logContainer").textContent =
          "Kon logs niet laden: " + err.message;
      }
    }

    document.querySelectorAll(".log-filter").forEach((btn) => {
      btn.addEventListener("click", () => {
        document
          .querySelectorAll(".log-filter")
          .forEach((b) => b.classList.remove("bg-indigo-600", "text-white"));
        btn.classList.add("bg-indigo-600", "text-white");
        currentFilter = btn.dataset.filter;
        loadLogs();
      });
    });

    document.getElementById("toggleRefresh").addEventListener("click", () => {
      autoRefresh = !autoRefresh;
      const btn = document.getElementById("toggleRefresh");
      if (autoRefresh) {
        btn.textContent = "Auto-refresh: aan";
        btn.className =
          "px-3 py-1 rounded-full bg-green-600 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500";
        loadStatus();
        loadLogs();
      } else {
        btn.textContent = "Auto-refresh: uit";
        btn.className =
          "px-3 py-1 rounded-full bg-red-600 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500";
      }
    });

    setInterval(loadStatus, 10000);
    setInterval(loadLogs, 15000);

    loadStatus();
    loadLogs();
  </script>

  <!-- ✅ Kleuren, animaties & logopmaak -->
  <script src="js/status-enhanced.js"></script>
</body>
</html>
