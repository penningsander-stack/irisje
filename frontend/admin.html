<!-- frontend/admin.html -->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Beheerdersdashboard – Irisje.nl</title>
  <meta name="description" content="Bekijk en handel gemelde reviews af als beheerder van Irisje.nl." />
  <meta name="theme-color" content="#4F46E5" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <!-- ✅ Lokale Tailwind build -->
  <link rel="stylesheet" href="style.css?v=20251101" />
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen fade-seq">

  <!-- HEADER -->
  <header class="bg-indigo-600 text-white py-4 shadow-md">
    <div class="max-w-6xl mx-auto flex justify-between items-center px-4">
      <h1 class="text-lg font-semibold flex items-center gap-2">
        🛠️ <span>Beheerdersdashboard</span>
      </h1>
      <button
        id="logoutBtn"
        class="bg-white text-indigo-700 font-medium rounded-lg px-4 py-1.5 text-sm hover:bg-indigo-50 transition focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-indigo-600"
      >
        Uitloggen
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="flex-1 max-w-6xl mx-auto px-4 py-10 space-y-10">

    <!-- Titelblok -->
    <section class="bg-white rounded-2xl shadow-md border border-gray-100 p-6 text-center">
      <h2 class="text-2xl font-bold text-indigo-700">Beheerdersdashboard</h2>
      <p class="text-sm text-gray-500 mt-1">
        Bekijk en handel gemelde reviews af
      </p>
    </section>

    <!-- 💬 Gemelde reviews -->
    <section class="bg-white rounded-2xl shadow-md border border-gray-100 p-6">
      <h3 class="text-xl font-semibold text-indigo-700 mb-4 flex items-center gap-2">
        💬 <span>Gemelde Reviews</span>
      </h3>

      <div class="overflow-x-auto rounded-xl border border-gray-100">
        <table class="w-full text-sm border-collapse">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="p-3 text-left">Naam</th>
              <th class="p-3 text-left">Beoordeling</th>
              <th class="p-3 text-left">Bericht</th>
              <th class="p-3 text-left">Datum</th>
              <th class="p-3 text-left">Actie</th>
            </tr>
          </thead>
          <tbody id="reportedReviewsBody">
            <tr>
              <td colspan="5" class="text-center text-gray-500 p-4">
                Reviews worden geladen...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="text-center text-sm text-gray-500 py-6 border-t bg-gray-100">
    © 2025 Irisje.nl – Alle rechten voorbehouden
  </footer>

  <!-- ✅ Toast container -->
  <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"></div>

  <!-- ✅ Script -->
  <script src="js/admin.js?v=20251101"></script>

  <!-- ✅ Uitloggen -->
  <script>
    document.getElementById("logoutBtn").addEventListener("click", () => {
      document.body.classList.add("fade-out");
      setTimeout(() => {
        localStorage.clear();
        window.location.href = "login.html";
      }, 500);
    });

    // ✅ Fade-in animatie (consistent met dashboard)
    document.addEventListener("DOMContentLoaded", () => {
      const blocks = [document.querySelector("header"), ...document.querySelectorAll("main section"), document.querySelector("footer")];
      blocks.forEach((el, i) => {
        if (!el) return;
        el.style.opacity = "0";
        el.style.transform = "translateY(12px)";
        setTimeout(() => {
          el.style.transition = "opacity 0.8s ease, transform 0.8s ease";
          el.style.opacity = "1";
          el.style.transform = "translateY(0)";
        }, 150 * i);
      });
    });
  </script>
</body>
</html>
