<!-- frontend/admin.html -->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Beheerdersdashboard – Irisje.nl</title>
  <meta name="description" content="Beheer gemelde reviews en systeemtesten op Irisje.nl." />
  <meta name="theme-color" content="#4F46E5" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css?v=20251111" />
  <style>
    .fade-row-out { animation: fadeRow 0.45s ease-out forwards; }
    @keyframes fadeRow {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-4px); }
    }
    .dropdown-list {
      border: 1px solid #e5e7eb;
      border-radius: 0.5rem;
      background: white;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 0.25rem;
    }
    .dropdown-item {
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .dropdown-item:hover {
      background: #f3f4f6;
    }
  </style>
</head>

<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen fade-seq">
  <!-- HEADER -->
  <header class="bg-indigo-600 text-white py-4 shadow-md">
    <div class="max-w-6xl mx-auto flex justify-between items-center px-4">
      <h1 class="text-lg font-semibold flex items-center gap-2">🛠️ <span>Beheerdersdashboard</span></h1>
      <button id="logoutBtn"
        class="bg-white text-indigo-700 font-medium rounded-lg px-4 py-2 shadow-sm hover:bg-indigo-50 transition">
        Uitloggen
      </button>
    </div>
  </header>

  <main class="flex-1 max-w-6xl mx-auto px-4 py-10 space-y-10">

    <!-- 🧪 SYSTEEMTEST -->
    <section class="bg-white shadow-md border border-gray-100 p-6 rounded-2xl">
      <h2 class="text-lg font-semibold text-gray-800 flex items-center gap-2 mb-4">🧪 Systeemtest – E-mailfunctie</h2>
      <p class="text-gray-500 text-sm mb-4">Verstuur een testaanvraag via de backend om te controleren of e-mails goed worden verzonden.</p>

      <form id="testEmailForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Naam</label>
          <input id="testName" type="text" required class="mt-1 w-full border border-gray-300 rounded-lg p-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="Bijv. Test Gebruiker" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">E-mailadres</label>
          <input id="testEmail" type="email" required class="mt-1 w-full border border-gray-300 rounded-lg p-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="bijv. test@example.com" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Bericht</label>
          <textarea id="testMessage" rows="3" required class="mt-1 w-full border border-gray-300 rounded-lg p-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="Bijv. Dit is een testaanvraag..."></textarea>
        </div>

        <!-- 🔍 Bedrijven laden + zoekfunctie -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Bedrijf kiezen</label>
          <button id="loadCompaniesBtn" type="button"
            class="bg-indigo-600 text-white px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-indigo-700 transition">
            🔄 Bedrijven laden
          </button>

          <div id="companyDropdownContainer" class="mt-3 hidden">
            <input type="text" id="searchCompany" placeholder="Zoek bedrijf..."
              class="w-full border border-gray-300 rounded-lg p-2 mb-2 focus:ring-indigo-500 focus:border-indigo-500" />

            <div id="companyList" class="dropdown-list"></div>
          </div>

          <input type="hidden" id="selectedCompanyId" required />
          <p id="selectedCompanyName" class="text-sm text-gray-500 mt-1"></p>
        </div>

        <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-medium hover:bg-indigo-700 transition">
          📤 Testaanvraag versturen
        </button>
      </form>

      <div id="testResult" class="mt-4 text-sm text-gray-700 whitespace-pre-wrap"></div>
    </section>
  </main>

  <footer class="bg-gray-100 text-center text-gray-500 text-sm py-4 mt-10 border-t border-gray-200">
    © 2025 Irisje.nl – Alle rechten voorbehouden
  </footer>

  <script>
    const apiBase = "https://irisje-backend.onrender.com/api";
    let allCompanies = [];

    const loadBtn = document.getElementById("loadCompaniesBtn");
    const dropdown = document.getElementById("companyDropdownContainer");
    const list = document.getElementById("companyList");
    const search = document.getElementById("searchCompany");
    const selectedId = document.getElementById("selectedCompanyId");
    const selectedName = document.getElementById("selectedCompanyName");

    // 🔄 Bedrijven laden
    loadBtn.addEventListener("click", async () => {
      loadBtn.disabled = true;
      loadBtn.textContent = "⏳ Laden...";
      try {
        const res = await fetch(`${apiBase}/companies?limit=20&sort=name`);
        const data = await res.json();
        allCompanies = data.items || [];
        if (allCompanies.length === 0) {
          loadBtn.textContent = "Geen bedrijven gevonden";
          return;
        }
        dropdown.classList.remove("hidden");
        renderCompanyList(allCompanies);
        loadBtn.textContent = "✅ Bedrijven geladen";
      } catch (err) {
        loadBtn.textContent = "⚠️ Fout bij laden";
        console.error("Fout bij laden bedrijven:", err);
      }
    });

    // 🧭 Lijst renderen
    function renderCompanyList(companies) {
      list.innerHTML = "";
      companies.forEach((c) => {
        const div = document.createElement("div");
        div.className = "dropdown-item";
        div.textContent = c.name;
        div.addEventListener("click", () => {
          selectedId.value = c._id;
          selectedName.textContent = `Geselecteerd: ${c.name}`;
          list.innerHTML = "";
          search.value = "";
        });
        list.appendChild(div);
      });
    }

    // 🔍 Zoeken binnen 20 bedrijven
    search.addEventListener("input", () => {
      const term = search.value.toLowerCase();
      const filtered = allCompanies.filter((c) => c.name.toLowerCase().includes(term));
      renderCompanyList(filtered);
    });

    // 📤 Testformulier verzenden
    document.getElementById("testEmailForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const result = document.getElementById("testResult");
      result.textContent = "⏳ Bezig met verzenden...";

      const payload = {
        customerName: document.getElementById("testName").value.trim(),
        customerEmail: document.getElementById("testEmail").value.trim(),
        message: document.getElementById("testMessage").value.trim(),
        companies: [selectedId.value.trim()]
      };

      if (!selectedId.value) {
        result.textContent = "⚠️ Kies eerst een bedrijf.";
        return;
      }

      try {
        const res = await fetch(`${apiBase}/publicRequests/multi`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (res.ok) {
          result.textContent = `✅ Succesvol verzonden:\n${JSON.stringify(data, null, 2)}`;
        } else {
          result.textContent = `⚠️ Fout (${res.status}): ${data.error || JSON.stringify(data)}`;
        }
      } catch (err) {
        result.textContent = `❌ Netwerkfout: ${err.message}`;
      }
    });
  </script>
</body>
</html>
